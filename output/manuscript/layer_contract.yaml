# Literature meta-analysis exemplar: optional monorepo adapters only.
#
# The domain src/ stays standalone except for these files, which use shared
# template infrastructure (logging + the figure-manager registry, and the
# deep-research dispatch surface) exactly as the other exemplars do. Everything
# else under src/ imports only stdlib + the scientific stack and is forkable as
# an infrastructure-free package.
#
# src/deep_research/ deliberately wires infrastructure.search.deep_research to
# demonstrate that capability via a deterministic, offline fixture-replay path
# (no network, no key); the live capability is paid and non-deterministic.
allow_infrastructure_imports:
  - src/manuscript/variables.py
  - src/visualization/figure_runner.py
  - src/deep_research/deep_research_adapter.py
